<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Peasport</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-container">
            <img src="pildid/peasport.jpg" alt="PEAsport logo">
            <span class="logo-text">PEASPORT</span>
        </a>
        <div class="nav-right">
            <a href="isikud.html">Isikud</a>
            <a href="miks_meie.html">Miks meie</a>
            <a href="kontakt.html">Kontakt</a>
        </div>
    </nav>

    <main class="main-content">
        <section class="hero">
            <h1>Võta ühendust</h1>
            <p>Kirjuta meile ja paneme su vaimse <i>stati</i> paika.</p>
        </section>

        <form class="contact-form">
            <input type="text" placeholder="Sinu nimi" required>
            <input type="email" placeholder="Sinu e-post" required>
            <textarea placeholder="Sinu sõnum" rows="5" required></textarea>
            <button type="submit" class="cta-button">Saada sõnum</button>
        </form>
    </main>

    <div class="floating-menu">
        <div class="social-icons">
            <a href="https://instagram.com" target="_blank" class="icon">IG</a>
            <a href="https://facebook.com" target="_blank" class="icon">FB</a>
            <a href="mailto:sinu@email.ee" class="icon">✉</a>
        </div>
        <div class="fab-button">💬</div>
    </div>

    <footer class="footer">
        <p>Lehekülje on koostanud Dagmar Rahula. Sisu on autoriõigusega kaitstud.</p>
    </footer>
</body>
</html>
